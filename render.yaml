services:
  - type: web
    name: symposium-api
    env: node
    plan: starter
    buildCommand: npm ci && npm run deploy:api:check
    startCommand: npm run api:start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4000
      - key: SYMPOSIUM_REQUIRE_AUTH
        value: "true"
      - key: SYMPOSIUM_ALLOW_DEV_ACTOR
        value: "false"
      - key: SYMPOSIUM_STRICT_ENV
        value: "true"
      - key: SYMPOSIUM_WEB_ORIGINS
        sync: false
      - key: SYMPOSIUM_OWNER_CLERK_USER_ID
        sync: false
      - key: SYMPOSIUM_OWNER_HANDLE
        value: "@udayan"
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_AUDIENCE
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SYMPOSIUM_AI_MODEL
        value: gpt-5.4-mini
